<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<title>Analytics</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body class="analytics">

 <!-- SIDEBAR -->
   <!-- HIDDEN CHECKBOX CONTROLLER -->
<input type="checkbox" id="sidebarToggle" class="sidebar-toggle">

<!-- HAMBURGER BUTTON -->
<label for="sidebarToggle" class="hamburger">
  <i class="fa-solid fa-bars"></i>
</label>

<!-- SIDEBAR -->
<aside class="sidebarapp">
  <h2 class="logo">MyTasks</h2>

  <nav>
    <a href="home.html">Dashboard</a>
    <a href="tasks.html">Tasks</a>
    <a href="analytics.html">Analytics</a>
    <a href="calendar.html">Calendar</a>
    <a href="profile.html">Profile</a>
    <a href="settings.html">Settings</a>
  </nav>

  <a href="index.html" class="logout">Logout</a>
</aside>

<!-- OVERLAY (click to close) -->
<label for="sidebarToggle" class="overlay"></label>

<main class="contents">

<div class="analytics-main">

    <h1>Analytics</h1>
    <p class="subtitle">Track your productivity and progress.</p>

    <div class="analytics-cards">

        <div class="analytics-card">
            <h3>Completion Rate</h3>
            <div class="number" id="completionRate">0%</div>
        </div>

        <div class="analytics-card">
            <h3>Tasks Completed</h3>
            <div class="number" id="completedTasks">0</div>
        </div>

        <div class="analytics-card">
            <h3>Total Tasks</h3>
            <div class="number" id="totalTasks">0</div>
        </div>

        <div class="analytics-card">
            <h3>Current Streak</h3>
            <div class="number" id="streak">0</div>
        </div>

    </div>

    <div class="analytics-charts">

        <div class="chart-box">
            <h3>Weekly Productivity</h3>
            <canvas id="weeklyChart"></canvas>
        </div>

        <div class="chart-box">
            <h3>Task Priority</h3>
        <canvas id="priorityChart"></canvas>
    </div>

    </div>

    <div class="chart-box monthly">
        <h3>Monthly Productivity</h3>
        <canvas id="monthlyChart"></canvas>
    </div>

</div>
</main>

<script src="analytics.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="tasks">
   <div class="tasks-containers">

  <!-- SIDEBAR -->
   <!-- HIDDEN CHECKBOX CONTROLLER -->
<input type="checkbox" id="sidebarToggle" class="sidebar-toggle">

<!-- HAMBURGER BUTTON -->
<label for="sidebarToggle" class="hamburger">
  <i class="fa-solid fa-bars"></i>
</label>

<!-- SIDEBAR -->
<aside class="sidebarapp">
  <h2 class="logo">MyApp</h2>

  <nav>
    <a href="home.html">Dashboard</a>
    <a href="tasks.html">Tasks</a>
    <a href="analytics.html">Analytics</a>
    <a href="calendar.html">Calendar</a>
    <a href="profile.html">Profile</a>
    <a href="settings.html">Settings</a>
  </nav>

  <a href="index.html" class="logout">Logout</a>
</aside>

<!-- OVERLAY (click to close) -->
<label for="sidebarToggle" class="overlay"></label>

  <!-- TASK CONTAINER -->
   <main class="contents">
 

    <!-- TOP CONTROLS -->
    <div class="top-controls">

      <input type="text" id="taskInput" placeholder="Enter a task...">

      <input type="date" id="dueDate">

      <select id="prioritySelect">
        <option value="normal">Normal</option>
        <option value="important">Important</option>
      </select>

      <button id="addTaskBtn">Add Task</button>

    </div>

    <!-- SEARCH + FILTER -->
    <!-- SEARCH BAR -->
<div class="search-section">
    <input type="text" id="searchInput" placeholder="Search tasks...">
</div>

<!-- FILTER BUTTONS -->
   <div class="filter-section">

    <button class="filter-btn active" data-filter="all">
        All Tasks
    </button>

    <button class="filter-btn" data-filter="completed">
        Completed
    </button>

    <button class="filter-btn" data-filter="pending">
        Pending
    </button>

    <button class="filter-btn" data-filter="important">
        Important
    </button>

   </div>

    <!-- TASK LIST -->
    <div id="taskList" class="task-list"></div>
</main>
   </div>

  <script src="tasks.js"></script>

</body>

</html>

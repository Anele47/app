<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Calendar</title>

    <!-- FullCalendar CSS -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css">

    <link rel="stylesheet" href="style.css">
</head>
<body class="calendar-page">
     <!-- SIDEBAR -->
   <!-- HIDDEN CHECKBOX CONTROLLER -->
<input type="checkbox" id="sidebarToggle" class="sidebar-toggle">

<!-- HAMBURGER BUTTON -->
<label for="sidebarToggle" class="hamburger">
  <i class="fa-solid fa-bars"></i>
</label>

<!-- SIDEBAR -->
<aside class="sidebarapp">
  <h2 class="logo">MyApp</h2>

  <nav>
    <a href="home.html">Dashboard</a>
    <a href="tasks.html">Tasks</a>
    <a href="analytics.html">Analytics</a>
    <a href="calendar.html">Calendar</a>
    <a href="profile.html">Profile</a>
    <a href="settings.html">Settings</a>
  </nav>

  <a href="index.html" class="logout">Logout</a>
</aside>

<!-- OVERLAY (click to close) -->
<label for="sidebarToggle" class="overlay"></label>
    
    <main class="contents">

      <div claa="calendar-container">

        <!-- Calendar Section -->
        <section class="calendar-section">
            <h1>Task Calendar</h1>

            <div id="calendar"></div>
        </section>

        <!-- Right Sidebar -->
        <aside class="calendar-sidebar">

            <!-- Selected Date Tasks -->
            <div class="calendar-cards">
                <h2>Tasks for Selected Date</h2>
                <ul id="taskList">
                    <li>Click a date to view tasks</li>
                </ul>
            </div>

            <!-- Upcoming Tasks -->
            <div class="calendar-card">
                <h2>Upcoming Tasks</h2>
                <ul id="upcomingTasks"></ul>
            </div>

        </aside>

      </div>

    </main>

    <!-- FullCalendar JS -->
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <script src="calendar.js"></script>

</body>
<footer>

    <h3>MyTasks</h3>

    <p>
        Organize your life one task at a time.
    </p>

    <div class="socials">

    </div>

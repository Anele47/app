<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Profile</title>
  </head>
  <body class="profile">

     <!-- SIDEBAR -->
   <!-- HIDDEN CHECKBOX CONTROLLER -->
<input type="checkbox" id="sidebarToggle" class="sidebar-toggle">

<!-- HAMBURGER BUTTON -->
<label for="sidebarToggle" class="hamburger">
  <i class="fa-solid fa-bars"></i>
</label>

<!-- SIDEBAR -->
<aside class="sidebarapp">
  <h2 class="logo">MyApp</h2>

  <nav>
    <a href="home.html">Dashboard</a>
    <a href="tasks.html">Tasks</a>
    <a href="analytics.html">Analytics</a>
    <a href="calendar.html">Calendar</a>
    <a href="profile.html">Profile</a>
    <a href="settings.html">Settings</a>
  </nav>

  <a href="index.html" class="logout">Logout</a>
</aside>

<!-- OVERLAY (click to close) -->
<label for="sidebarToggle" class="overlay"></label>


      <main class="contents">
        <div class="profile-card">
          <div class="profile-header">
            <div class="user-info">
              <img
                id="profileImage"
                src="https://via.placeholder.com/120"
                alt="Profile"
              />

              <div>
                <h1 id="profileName">User Name</h1>
                <p id="profileEmail">user@email.com</p>
              </div>
            </div>

            <a href="settings.html">
              <button>Edit Profile</button>
            </a>
          </div>

          <div class="profile-stats">
            <div class="profile-stat">
              <h2 id="totalTasks">0</h2>
              <p>Total Tasks</p>
            </div>

            <div class="profile-stat">
              <h2 id="completedTasks">0</h2>
              <p>Completed Tasks</p>
            </div>

            <div class="profile-stat">
              <h2 id="completionRate">0%</h2>
              <p>Completion Rate</p>
            </div>

            <div class="profile-stat">
              <h2 id="streak">0</h2>
              <p>Day Streak</p>
            </div>
          </div>

          <div class="profile-about">
            <h3>About Me</h3>
            <p id="aboutMe">No bio added yet.</p>
          </div>
        </div>
    </div>
      </main>

    <script src="profile.js"></script>
  </body>
  
</html>
